<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scanner</title>

    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <div class="container">
      <input id="nameInput" placeholder="Имя" />
      <textarea id="myTextarea" placeholder="Коды"></textarea>

      <button id="scanner-btn" class="btn">СКАНИРОВАТЬ</button>

      <div id="qr-reader"></div>

      <div class="statistic">
        <p class="js-statistic__text statistic__text"></p>
      </div>
    </div>

    <div class="bottom-bar">
      <button id="checkBtn" class="bottom-btn">Проверить</button>
      <button id="clearBtn" class="bottom-btn">Очистить</button>
      <button id="copyBtn" class="bottom-btn">Копировать</button>
    </div>

    <!-- modals -->
    <div id="clearModal" class="modal">
      <div class="modal-content">
        <p>Очистить?</p>
        <button id="confirmBtn" class="ok confirm">Да</button>
        <button id="cancelBtn" class="cancel confirm">Нет</button>
      </div>
    </div>

    <div id="copyModal" class="modal">
      <div class="modal-content">
        <p>Скопировано</p>
        <button id="okBtn" class="cancel confirm">OK</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
