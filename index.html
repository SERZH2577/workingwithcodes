<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f0f" />
    <title>WWC - working with codes</title>

    <link rel="icon" href="./favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="./favicon-96x96.png"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./apple-touch-icon.png"
    />
    <link rel="manifest" href="./site.webmanifest" />

    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="name-row">
        <input type="text" id="nameInput" placeholder="Имя" />

        <div class="type-select">
          <button id="typeBtn" class="type-btn">Категория</button>

          <div id="typeMenu" class="type-menu hidden">
            <label class="type-item type-option">
              <input type="checkbox" value="короба" />
              <span>короба</span>
            </label>

            <label class="type-item type-option">
              <input type="checkbox" value="пары" />
              <span>пары</span>
            </label>
          </div>
        </div>
      </div>

      <textarea id="myTextarea" placeholder="Коды"></textarea>

      <div id="qr-reader"></div>

      <div class="statistic">
        <div class="statistic__title js-statistic__title"></div>

        <div class="statistic__row">
          <div class="statistic__box">
            <div class="statistic__value js-statistic__value">0</div>
          </div>

          <div class="statistic__actions">
            <button id="shareBtn" class="icon-btn hidden">
              <img src="./img/share.svg" alt="share" />
            </button>

            <button id="copyBtn" class="icon-btn copy hidden">
              <svg class="icon">
                <use href="./img/sprite.svg#icon-copy"></use>
              </svg>
            </button>

            <button id="deleteBtn" class="icon-btn hidden">
              <img src="./img/delete.svg" alt="share" />
            </button>

            <!-- <button id="" class="statistic__action delete hidden">
              Удалить
            </button> -->
          </div>
        </div>
      </div>
    </div>

    <!-- === BOTTOM BAR === -->

    <div class="bottom-bar">
      <button id="clearBtn" class="bottom-bar-btn">
        <svg class="icon-bottom-bar icon-data-cleaning">
          <use href="./img/sprite.svg#icon-clean"></use>
        </svg>
        <!-- <span class="bottom-bar-text">clean</span> -->
      </button>

      <button id="checkBtn" class="bottom-bar-btn">
        <svg class="icon-bottom-bar icon-search-for-duplicates">
          <use href="./img/sprite.svg#icon-search-for-duplicates"></use>
        </svg>
        <!-- <span class="bottom-bar-text">chack</span> -->
      </button>

      <button id="scanner-btn" class="bottom-bar-btn">
        <svg class="icon-bottom-bar icon-scan">
          <use href="./img/sprite.svg#icon-scan"></use>
        </svg>
        <!-- <span class="bottom-bar-text">scan</span> -->
      </button>

      <button id="menu-btn" class="bottom-bar-btn">
        <svg class="icon-bottom-bar icon-menu">
          <use href="./img/sprite.svg#icon-menu"></use>
        </svg>
      </button>

      <button id="close-menu-btn" class="bottom-bar-btn hidden">
        <svg class="icon-bottom-bar icon-close-menu">
          <use href="./img/sprite.svg#icon-close-menu"></use>
        </svg>
      </button>
    </div>

    <!-- modals -->
    <div id="clearModal" class="modal">
      <div class="modal-content">
        <p class="info-text">Подтвердите очистку!</p>
        <div class="btn-container">
          <button id="confirmBtn" class="ok confirm modal-btn">Очистить</button>
          <button id="cancelBtn" class="cancel confirm modal-btn">
            Отмена
          </button>
        </div>
      </div>
    </div>

    <div id="copyModal" class="modal">
      <div class="modal-content">
        <p class="info-text">Скопировано</p>
        <button id="okBtn" class="cancel confirm modal-btn">OK</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
